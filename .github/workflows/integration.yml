name: Integration Tests

on:
  schedule:
    - cron: '0 2 * * *' # nightly at 02:00 UTC
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider to test (google, openrouter, bedrock, vertex, all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - google
          - openrouter
          - bedrock
          - vertex
          - azure

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  integration:
    name: Integration tests — ${{ github.event.inputs.provider || 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to Google Cloud
        if: github.event.inputs.provider == 'vertex' || github.event.inputs.provider == 'all' || github.event_name == 'schedule'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WI_PROVIDER }}
          service_account: ${{ secrets.WI_SA_EMAIL }}

      - name: Run Google integration tests
        if: github.event.inputs.provider == 'google' || github.event.inputs.provider == 'all' || github.event_name == 'schedule'
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: npm run test:integration -- --reporter=verbose src/adapters/__integration__/google.integration.test.ts

      - name: Run OpenRouter integration tests
        if: github.event.inputs.provider == 'openrouter' || github.event.inputs.provider == 'all' || github.event_name == 'schedule'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npm run test:integration -- --reporter=verbose src/adapters/__integration__/openrouter.integration.test.ts

      - name: Run Bedrock integration tests
        if: github.event.inputs.provider == 'bedrock' || github.event.inputs.provider == 'all' || github.event_name == 'schedule'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: npm run test:integration -- --reporter=verbose src/adapters/__integration__/bedrock.integration.test.ts

      - name: Run Vertex integration tests
        if: github.event.inputs.provider == 'vertex' || github.event.inputs.provider == 'all' || github.event_name == 'schedule'
        env:
          VERTEX_PROJECT: ${{ secrets.VERTEX_PROJECT }}
        run: npm run test:integration -- --reporter=verbose src/adapters/__integration__/vertex.integration.test.ts

      - name: Run Azure integration tests
        if: github.event.inputs.provider == 'azure' || github.event.inputs.provider == 'all' || github.event_name == 'schedule'
        env:
          AZURE_OPENAI_RESOURCE_NAME: ${{ secrets.AZURE_OPENAI_RESOURCE_NAME }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_AI_SERVICES_ENDPOINT: ${{ secrets.AZURE_AI_SERVICES_ENDPOINT }}
          AZURE_AI_SERVICES_API_KEY: ${{ secrets.AZURE_AI_SERVICES_API_KEY }}
        run: npm run test:integration -- --reporter=verbose src/adapters/__integration__/azure.integration.test.ts
